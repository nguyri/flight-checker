server {
    listen 80;
    server_name localhost; # Replace with your private server IP or domain name if applicable

    location / {
        # Enforce Basic Authentication
        auth_basic "Restricted Access";
        auth_basic_user_file /etc/nginx/auth/.htpasswd;

        # Reverse proxy to the Streamlit app container
        proxy_pass http://app:8501;
        
        # Necessary headers for Streamlit's real-time WebSockets on Linux
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}