services:
  # Your Application Container
  app:
    build: ../app
    container_name: flight-checker-app
    restart: always
    volumes:
      # Mount the sibling 'data' folder on the host to the root '/data' folder inside the container
      - ../data:/data
    environment:
      - INPUT_CSV_PATH=/data/source.csv
    expose:
      - "8501"

  # Your Nginx Gateway (Authentication Guard)
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./auth:/etc/nginx/auth:ro
    depends_on:
      - app